services:
  - type: web
    name: usdt-whatsapp-scanner
    env: python
    plan: free
    buildCommand: ""
    startCommand: "python3 app.py"
    healthCheckPath: /health
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886
      - key: ALERT_WHATSAPP_TO
        sync: false
